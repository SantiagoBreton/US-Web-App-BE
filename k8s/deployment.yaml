apiVersion: apps/v1
kind: Deployment
metadata:
  name: us-be
  namespace: us-app
  labels:
    app: us-be
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: us-be
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: us-be
    spec:

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: us-be
          image: us-be:latest     # replaced by CI/CD with the actual image tag
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          # Load non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: us-be-config

          # Load sensitive values from Secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: us-be-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: us-be-secrets
                  key: JWT_SECRET
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: us-be-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: us-be-secrets
                  key: EMAIL_PASS

          # Resource limits prevent a single pod from starving the node
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Probes
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20

          # Drop all capabilities — principle of least privilege
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true

      restartPolicy: Always
