# Secret values must be base64-encoded.
# Generate with: echo -n "your_value" | base64
#
# In a GitOps workflow, this file should NEVER contain real values.
# Use a secrets manager (AWS Secrets Manager, Sealed Secrets, External Secrets Operator)
# and reference secrets by name, or inject via CI/CD.
apiVersion: v1
kind: Secret
metadata:
  name: us-be-secrets
  namespace: us-app
type: Opaque
data:
  DATABASE_URL: <base64-encoded-database-url>
  JWT_SECRET: <base64-encoded-jwt-secret>
  EMAIL_USER: <base64-encoded-email-user>
  EMAIL_PASS: <base64-encoded-email-pass>
